name: CI/CD Pipeline

permissions:
  contents: read
  issues: read
  checks: write
  pull-requests: write

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
        
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Formato (Ruff)
      run: ruff format . --check
      
    - name: Linter (Ruff)
      run: ruff check .
      
    - name: Tests (Pytest)
      env:
        DB_URL: ${{ secrets.DB_URL }}
      run: pytest tests/ --junitxml=pytest-results.xml

    - name: Publicar resultados de los test
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always() 
      with:
        files: pytest-results.xml
